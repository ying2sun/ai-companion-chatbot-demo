<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI Companion</title>
<style>
  :root {
    --paper: #F4F2ED;
    --ink: #232A33;
    --harbor: #2B6E6B;
    --harbor-soft: #E4EEEC;
    --harbor-border: #BFDAD6;
    --ember: #C1633C;
    --ember-soft: #F4E3DA;
    --ember-border: #E3B79E;
    --sand: #E8E3D8;
    --muted: #7B8288;
    --white: #FFFFFF;
    --danger: #B3413A;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(160deg, #F8F6F1 0%, var(--paper) 45%, #EFEEE7 100%);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .topbar-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    color: var(--ink);
    text-decoration: none;
    opacity: 0.7;
  }

  .topbar-link:hover { opacity: 1; background: rgba(0,0,0,0.04); }

  /* ---------- Debug panel ---------- */

  .debug-toggle {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-left: 4px;
  }

  .debug-toggle:hover { background: rgba(0,0,0,0.04); color: var(--ink); border-color: var(--sand); }
  .debug-toggle.active { color: var(--harbor); border-color: var(--harbor-border); background: var(--harbor-soft); }

  .debug-panel {
    flex-shrink: 0;
    overflow: hidden;
    max-height: 0;
    transition: max-height 220ms ease;
    background: var(--sand);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .debug-panel.open { max-height: 120px; }

  .debug-panel-inner {
    padding: 10px 16px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 12px;
    color: var(--ink);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 4px 16px;
  }

  .debug-panel-inner .row-label { color: var(--muted); }
  .debug-panel-inner .row-value { font-weight: 600; }
  .debug-panel-inner .flag-on { color: var(--ember); }

  .persona-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--harbor-border);
    color: var(--harbor);
    font-size: 15px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
  }

  .persona-pill .chevron { font-size: 11px; transition: transform 150ms ease; }
  .persona-pill.open .chevron { transform: rotate(180deg); }

  /* ---------- Settings popover ---------- */

  .settings-popover {
    position: absolute;
    top: 60px;
    right: 16px;
    background: var(--white);
    border: 1px solid var(--sand);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(35, 42, 51, 0.12);
    padding: 16px;
    width: 220px;
    z-index: 20;
  }

  .settings-popover.hidden { display: none; }

  .settings-group + .settings-group { margin-top: 14px; }

  .settings-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .settings-options {
    display: flex;
    gap: 6px;
  }

  .settings-options button {
    flex: 1;
    border: 1px solid var(--sand);
    background: var(--paper);
    color: var(--ink);
    font-size: 13px;
    padding: 8px 4px;
    border-radius: 10px;
    cursor: pointer;
  }

  .settings-options button.active {
    background: var(--harbor);
    border-color: var(--harbor);
    color: var(--white);
  }

  /* ---------- Message list ---------- */

  .message-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 16px;
    display: flex;
    flex-direction: column;
  }

  .row { display: flex; margin-bottom: 12px; }
  .row.from-user { justify-content: flex-end; margin-left: 60px; }
  .row.from-ai { justify-content: flex-start; margin-right: 60px; }

  .bubble-wrap { max-width: 100%; display: flex; flex-direction: column; }
  .row.from-user .bubble-wrap { align-items: flex-end; }
  .row.from-ai .bubble-wrap { align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    font-size: 17px;
    line-height: 1.5;
  }

  .bubble.user {
    background: var(--harbor-soft);
    color: var(--ink);
    border-radius: 18px 4px 18px 18px;
  }

  .bubble.ai {
    background: var(--white);
    color: var(--ink);
    border: 1px solid var(--sand);
    border-radius: 4px 18px 18px 18px;
  }

  .bubble.error {
    background: var(--white);
    border: 1px solid var(--ember-border);
    color: var(--danger);
    border-radius: 4px 18px 18px 18px;
  }

  .timestamp {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .audio-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    padding: 0 4px;
    font-size: 13px;
    color: var(--harbor);
    cursor: pointer;
    user-select: none;
  }

  .audio-footer .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--harbor);
    animation: dotPulse 1s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ---------- Thinking bubble ---------- */

  .thinking-dots { display: flex; gap: 5px; padding: 4px 0; }
  .thinking-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ember);
    animation: thinkPulse 900ms ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 160ms; }
  .thinking-dots span:nth-child(3) { animation-delay: 320ms; }

  @keyframes thinkPulse {
    0%, 100% { transform: scale(0.6); opacity: 0.5; }
    50% { transform: scale(1); opacity: 1; }
  }

  /* ---------- Voice bubble (user's recorded turn) ---------- */

  .voice-bubble {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--harbor-soft);
    border-radius: 18px 4px 18px 18px;
    padding: 10px 14px;
  }

  .voice-play-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--harbor);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .voice-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--harbor);
    opacity: 0.45;
    flex-shrink: 0;
  }

  .voice-duration { font-size: 13px; color: var(--ink); flex-shrink: 0; }

  /* ---------- Chips ---------- */

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    padding: 0 4px;
  }

  .chip {
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid transparent;
  }

  .chip-action {
    background: rgba(43, 110, 107, 0.08);
    border-color: rgba(43, 110, 107, 0.35);
    color: var(--harbor);
    cursor: pointer;
  }

  .chip-action:hover { background: rgba(43, 110, 107, 0.15); }

  /* Untappable style, used for the unit-conversion info chip
     (action="unit_info") emitted by suggestions/units.py. */
  .chip-info {
    background: var(--ember-soft);
    border-color: var(--ember-border);
    color: var(--ink);
    font-weight: 600;
    cursor: default;
  }

  /* ---------- Voice orb section ---------- */

  .orb-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 0 10px;
    flex-shrink: 0;
  }

  .orb-button {
    width: 128px;
    height: 128px;
    border-radius: 50%;
    border: none;
    padding: 0;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.85), rgba(255,255,255,0.35));
    box-shadow: 0 4px 14px rgba(35, 42, 51, 0.10);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb-button:disabled { cursor: default; opacity: 0.55; }

  .orb-rings { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .orb-rings circle {
    fill: none;
    stroke-width: 2.5;
    transform-origin: center;
  }

  .mic-icon { position: relative; z-index: 1; width: 30px; height: 30px; color: var(--harbor); }

  /* idle: slow single-ring breathing pulse */
  .state-idle .ring-1 { stroke: var(--harbor); opacity: 0.4; animation: breathe 2600ms ease-in-out infinite; }
  .state-idle .ring-2, .state-idle .ring-3 { opacity: 0; }

  @keyframes breathe {
    0%, 100% { r: 40; opacity: 0.25; }
    50% { r: 46; opacity: 0.5; }
  }

  /* recording: rings pulse outward, warm color */
  .state-recording .mic-icon { color: var(--ember); }
  .state-recording .ring-1, .state-recording .ring-2, .state-recording .ring-3 {
    stroke: var(--ember);
    animation: pulseOut 1200ms ease-out infinite;
  }
  .state-recording .ring-2 { animation-delay: 260ms; }
  .state-recording .ring-3 { animation-delay: 520ms; }

  @keyframes pulseOut {
    0% { r: 18; opacity: 0.7; }
    100% { r: 50; opacity: 0; }
  }

  /* thinking: rotating dashed arc */
  .state-thinking .ring-1 {
    stroke: var(--ember);
    stroke-dasharray: 40 200;
    opacity: 0.8;
    animation: spin 1100ms linear infinite;
  }
  .state-thinking .ring-2, .state-thinking .ring-3 { opacity: 0; }
  .state-thinking .mic-icon { opacity: 0.4; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* speaking: concentric rings pulsing in sync, faster tempo */
  .state-speaking .mic-icon { color: var(--harbor); }
  .state-speaking .ring-1, .state-speaking .ring-2, .state-speaking .ring-3 {
    stroke: var(--harbor);
    animation: speakPulse 620ms ease-in-out infinite;
  }
  .state-speaking .ring-1 { animation-delay: 0ms; }
  .state-speaking .ring-2 { animation-delay: 120ms; }
  .state-speaking .ring-3 { animation-delay: 240ms; }

  @keyframes speakPulse {
    0%, 100% { r: 30; opacity: 0.6; }
    50% { r: 42; opacity: 0.15; }
  }

  .orb-status {
    margin-top: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--harbor);
    min-height: 20px;
  }

  /* ---------- Input bar ---------- */

  .input-bar {
    flex-shrink: 0;
    padding: 8px 14px 4px;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  #textInput {
    flex: 1;
    resize: none;
    border: 1px solid var(--sand);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 16px;
    font-family: inherit;
    background: var(--white);
    max-height: 110px;
    line-height: 1.4;
  }

  #textInput:focus {
    outline: none;
    border-color: var(--harbor);
  }

  #sendButton {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--sand);
    color: var(--white);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 200ms ease;
  }

  #sendButton.ready { background: var(--harbor); cursor: pointer; }
  #sendButton:disabled { cursor: default; }

  .disclaimer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 16px 10px;
  }

  @media (max-width: 420px) {
    .row.from-user { margin-left: 32px; }
    .row.from-ai { margin-right: 32px; }
    .orb-button { width: 112px; height: 112px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div style="display: flex; align-items: center;">
    <a class="topbar-link" href="https://github.com/ying2sun/ai-companion-chatbot-demo" target="_blank" rel="noopener" aria-label="View source on GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <button id="debugToggle" class="debug-toggle" aria-label="Toggle debug info" title="Debug info">Debug panel</button>
  </div>
  <button id="personaPill" class="persona-pill" aria-haspopup="true" aria-expanded="false">
    AI Companion <span class="chevron">&#9662;</span>
  </button>
</header>

<div id="debugPanel" class="debug-panel">
  <div class="debug-panel-inner">
    <div><span class="row-label">session </span><span class="row-value" id="dbgSession">-</span></div>
    <div><span class="row-label">turns </span><span class="row-value" id="dbgTurns">0</span></div>
    <div><span class="row-label">last latency </span><span class="row-value" id="dbgLatency">-</span></div>
    <div><span class="row-label">web search </span><span class="row-value" id="dbgSearch">-</span></div>
    <div><span class="row-label">guardrail </span><span class="row-value" id="dbgGuardrail">-</span></div>
  </div>
</div>

<div id="settingsPopover" class="settings-popover hidden">
  <div class="settings-group">
    <span class="settings-label">Persona</span>
    <div class="settings-options" data-group="persona">
      <button data-value="caregiver">Caregiver</button>
      <button data-value="friend">Friend</button>
      <button data-value="assistant" class="active">Assistant</button>
    </div>
  </div>
  <div class="settings-group">
    <span class="settings-label">Voice</span>
    <div class="settings-options" data-group="voiceGender">
      <button data-value="female" class="active">Female</button>
      <button data-value="male">Male</button>
    </div>
  </div>
</div>

<main class="message-list" id="messageList"></main>

<section class="orb-section">
  <button id="orbButton" class="orb-button state-idle" aria-label="Start talking">
    <svg class="orb-rings" viewBox="0 0 120 120">
      <circle class="ring ring-1" cx="60" cy="60" r="40"/>
      <circle class="ring ring-2" cx="60" cy="60" r="30"/>
      <circle class="ring ring-3" cx="60" cy="60" r="20"/>
    </svg>
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/>
    </svg>
  </button>
  <div class="orb-status" id="orbStatus">Tap to start talking</div>
</section>

<div class="input-bar">
  <div class="input-row">
    <textarea id="textInput" rows="1" placeholder="Type a message..."></textarea>
    <button id="sendButton" aria-label="Send message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
  <div class="disclaimer">AI can make mistakes. Please verify important information.</div>
</div>

<script>
(function () {
  "use strict";

  // Automatically uses the local backend when running on localhost, and
  // the deployed backend everywhere else (GitHub Pages included). This
  // exists specifically so a future local-testing edit can't silently
  // regress the deployed version, or vice versa, no single line to
  // remember to swap back.
  const IS_LOCAL = ["localhost", "127.0.0.1"].includes(window.location.hostname);
  const API_BASE = IS_LOCAL
    ? "http://localhost:8000"
    : "https://ai-companion-chatbot-demo.onrender.com";
  const MAX_RECORD_SECONDS = 60;

  // A genuinely silent, correctly-formed WAV (8kHz mono 8-bit, 1 sample).
  // Playing this synchronously inside a real user gesture (tap, click) is
  // what unlocks later programmatic audio.play() calls on browsers with
  // strict autoplay policies (notably iOS Safari). Without this, the AI's
  // spoken reply can silently fail to play, since by the time the /chat
  // fetch resolves, the browser may no longer count it as part of the
  // original gesture.
  const SILENT_WAV = "data:audio/wav;base64,UklGRiUAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQEAAACA";
  let audioUnlocked = false;

  function unlockAudioPlayback() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    try {
      const unlock = new Audio(SILENT_WAV);
      unlock.play().catch(function () { /* best effort, ignore rejection */ });
    } catch (e) { /* best effort */ }
  }

  let state = "idle"; // idle | recording | thinking | speaking
  let sessionId = null;
  let persona = "assistant";
  let voiceGender = "female";
  let displayName = "";
  let turnCount = 0;

  let mediaRecorder = null;
  let audioChunks = [];
  let recordingStartTime = null;
  let recordingTimerInterval = null;
  let currentAudio = null;

  const messageList = document.getElementById("messageList");
  const orbButton = document.getElementById("orbButton");
  const orbStatus = document.getElementById("orbStatus");
  const textInput = document.getElementById("textInput");
  const sendButton = document.getElementById("sendButton");
  const personaPill = document.getElementById("personaPill");
  const settingsPopover = document.getElementById("settingsPopover");
  const debugToggle = document.getElementById("debugToggle");
  const debugPanel = document.getElementById("debugPanel");
  const dbgSession = document.getElementById("dbgSession");
  const dbgTurns = document.getElementById("dbgTurns");
  const dbgLatency = document.getElementById("dbgLatency");
  const dbgSearch = document.getElementById("dbgSearch");
  const dbgGuardrail = document.getElementById("dbgGuardrail");

  // ---------- Debug panel ----------

  debugToggle.addEventListener("click", function () {
    debugPanel.classList.toggle("open");
    debugToggle.classList.toggle("active");
  });

  function updateDebugPanel(data) {
    turnCount += 1;
    dbgSession.textContent = data.session_id ? data.session_id.slice(0, 8) : "-";
    dbgTurns.textContent = String(turnCount);
    dbgLatency.textContent = data.latency_ms + " ms";
    dbgSearch.textContent = data.web_search_performed ? "yes" : "no";
    dbgSearch.classList.toggle("flag-on", !!data.web_search_performed);
    dbgGuardrail.textContent = data.guardrail_triggered ? data.guardrail_reason : "none";
    dbgGuardrail.classList.toggle("flag-on", !!data.guardrail_triggered);
  }

  // ---------- Formatting ----------

  function formatTimestamp(date) {
    const weekday = date.toLocaleDateString("en-US", { weekday: "long" });
    const month = date.toLocaleDateString("en-US", { month: "long" });
    const day = date.getDate();
    const year = date.getFullYear();
    let hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, "0");
    const ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12;
    if (hours === 0) hours = 12;
    return weekday + ", " + month + " " + day + ", " + year + " " + hours + ":" + minutes + " " + ampm;
  }

  function formatDuration(seconds) {
    const total = Math.round(seconds);
    const m = Math.floor(total / 60);
    const s = String(total % 60).padStart(2, "0");
    return m + ":" + s;
  }

  function scrollToBottom() {
    messageList.scrollTop = messageList.scrollHeight;
  }

  // ---------- State machine for the orb ----------

  function setState(next) {
    state = next;
    orbButton.classList.remove("state-idle", "state-recording", "state-thinking", "state-speaking");
    orbButton.classList.add("state-" + next);
    orbButton.disabled = next === "thinking";
    updateOrbStatus();
  }

  function updateOrbStatus() {
    if (state === "idle") {
      orbStatus.textContent = "Tap to start talking";
    } else if (state === "recording") {
      const elapsed = (Date.now() - recordingStartTime) / 1000;
      const remaining = Math.max(0, Math.ceil(MAX_RECORD_SECONDS - elapsed));
      orbStatus.textContent = remaining <= 10
        ? remaining + " seconds left, tap to send"
        : "Listening, tap to send";
    } else if (state === "thinking") {
      orbStatus.textContent = "Thinking...";
    } else if (state === "speaking") {
      orbStatus.textContent = "Speaking...";
    }
  }

  // ---------- Bubble rendering ----------

  function appendUserBubble(text) {
    const row = document.createElement("div");
    row.className = "row from-user";
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap";
    const bubble = document.createElement("div");
    bubble.className = "bubble user";
    bubble.textContent = text;
    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = formatTimestamp(new Date());
    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    row.appendChild(wrap);
    messageList.appendChild(row);
    scrollToBottom();
    return row;
  }

  function computeVoiceBarWidth(durationSeconds) {
    const minWidth = 40;
    const maxWidth = 220;
    const clamped = Math.max(0, Math.min(durationSeconds, MAX_RECORD_SECONDS));
    const ratio = clamped / MAX_RECORD_SECONDS;
    return Math.round(minWidth + (maxWidth - minWidth) * ratio);
  }

  function appendVoiceBubble(durationSeconds) {
    const row = document.createElement("div");
    row.className = "row from-user";
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap";
    const bubble = document.createElement("div");
    bubble.className = "voice-bubble";
    const barWidth = computeVoiceBarWidth(durationSeconds);
    bubble.innerHTML =
      '<button class="voice-play-btn" aria-label="Voice message"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>' +
      '<span class="voice-bar" style="width:' + barWidth + 'px"></span>' +
      '<span class="voice-duration">' + formatDuration(durationSeconds) + "</span>";
    wrap.appendChild(bubble);
    row.appendChild(wrap);
    messageList.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendThinkingBubble() {
    const row = document.createElement("div");
    row.className = "row from-ai";
    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    messageList.appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendErrorBubble(text) {
    const row = document.createElement("div");
    row.className = "row from-ai";
    const bubble = document.createElement("div");
    bubble.className = "bubble error";
    bubble.textContent = "\u26A0 " + text;
    row.appendChild(bubble);
    messageList.appendChild(row);
    scrollToBottom();
  }

  function replaceWithError(rowEl, text) {
    rowEl.innerHTML = "";
    const bubble = document.createElement("div");
    bubble.className = "bubble error";
    bubble.textContent = "\u26A0 " + text;
    rowEl.appendChild(bubble);
  }

  function renderChip(chip) {
    const isInfo = chip.action === "unit_info";
    const el = document.createElement(isInfo ? "div" : "button");
    el.className = "chip " + (isInfo ? "chip-info" : "chip-action");
    el.textContent = chip.label;
    if (!isInfo) {
      el.addEventListener("click", function () { handleChipTap(chip); });
    }
    return el;
  }

  function handleChipTap(chip) {
    if (chip.action === "phone_call") {
      window.location.href = "tel:" + chip.target;
    } else if (chip.action === "external_url") {
      window.open(chip.target, "_blank", "noopener");
    }
  }

  function replaceThinkingWithReply(rowEl, data) {
    rowEl.innerHTML = "";
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.textContent = data.reply_text;
    wrap.appendChild(bubble);

    const footer = document.createElement("div");
    footer.className = "audio-footer";
    footer.style.visibility = "hidden";
    wrap.appendChild(footer);

    if (data.suggestions && data.suggestions.length > 0) {
      const chipRow = document.createElement("div");
      chipRow.className = "chip-row";
      data.suggestions.forEach(function (chip) {
        chipRow.appendChild(renderChip(chip));
      });
      wrap.appendChild(chipRow);
    }

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = formatTimestamp(new Date());
    wrap.appendChild(ts);

    rowEl.appendChild(wrap);
    scrollToBottom();
    return footer;
  }

  function setFooterPlaying(footer, audio) {
    footer.style.visibility = "visible";
    footer.innerHTML = '<span class="dot"></span> Playing';
    footer.onclick = function () {
      audio.pause();
    };
  }

  function setFooterReplay(footer, base64, mime) {
    footer.style.visibility = "visible";
    footer.innerHTML = "\u21BA Replay";
    footer.onclick = function () {
      playAudioIntoFooter(base64, mime, footer);
    };
  }

  // ---------- Audio playback ----------

  function playAudioIntoFooter(base64, mime, footer) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    setState("speaking");
    const audio = new Audio("data:" + mime + ";base64," + base64);
    currentAudio = audio;
    setFooterPlaying(footer, audio);

    audio.addEventListener("ended", function () {
      currentAudio = null;
      setState("idle");
      setFooterReplay(footer, base64, mime);
    });
    audio.addEventListener("pause", function () {
      if (currentAudio === audio) {
        currentAudio = null;
        setState("idle");
        setFooterReplay(footer, base64, mime);
      }
    });
    audio.play().catch(function () {
      currentAudio = null;
      setState("idle");
      setFooterReplay(footer, base64, mime);
    });
  }

  // ---------- Networking ----------

  async function handleChatResponse(res, thinkingRow) {
    if (res.status === 429) {
      let detail = "";
      try { detail = (await res.json()).detail; } catch (e) { /* no body */ }
      const msg = detail === "daily_limit_reached"
        ? "This demo has reached its usage limit for today. Please check back tomorrow."
        : "Too many requests. Please wait a moment and try again.";
      replaceWithError(thinkingRow, msg);
      setState("idle");
      return;
    }
    if (res.status === 422) {
      replaceWithError(thinkingRow, "I did not catch that. Please try again.");
      setState("idle");
      return;
    }
    if (!res.ok) {
      replaceWithError(thinkingRow, "Something went wrong. Please try again.");
      setState("idle");
      return;
    }

    const data = await res.json();
    sessionId = data.session_id;
    updateDebugPanel(data);

    const footer = replaceThinkingWithReply(thinkingRow, data);

    if (data.audio_base64) {
      playAudioIntoFooter(data.audio_base64, data.audio_mime, footer);
    } else {
      setState("idle");
    }
  }

  function buildFormData(extra) {
    const formData = new FormData();
    if (sessionId) formData.append("session_id", sessionId);
    formData.append("persona", persona);
    formData.append("voice_gender", voiceGender);
    if (displayName) formData.append("display_name", displayName);
    Object.keys(extra).forEach(function (key) {
      formData.append(key, extra[key]);
    });
    return formData;
  }

  async function sendText() {
    const text = textInput.value.trim();
    if (!text || state !== "idle") return;
    unlockAudioPlayback();
    textInput.value = "";
    autoResize();

    appendUserBubble(text);
    const thinkingRow = appendThinkingBubble();
    setState("thinking");

    try {
      const res = await fetch(API_BASE + "/chat", {
        method: "POST",
        body: buildFormData({ message: text }),
      });
      await handleChatResponse(res, thinkingRow);
    } catch (err) {
      replaceWithError(thinkingRow, "Connection failed. Please check your network and try again.");
      setState("idle");
    }
  }

  async function sendVoice(audioBlob, elapsedSeconds) {
    appendVoiceBubble(elapsedSeconds);
    const thinkingRow = appendThinkingBubble();
    setState("thinking");

    try {
      const formData = buildFormData({});
      formData.append("audio", audioBlob, "recording.webm");
      const res = await fetch(API_BASE + "/chat", { method: "POST", body: formData });
      await handleChatResponse(res, thinkingRow);
    } catch (err) {
      replaceWithError(thinkingRow, "Connection failed. Please check your network and try again.");
      setState("idle");
    }
  }

  // ---------- Recording ----------

  async function startRecording() {
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      appendErrorBubble("Voice input is not supported in this browser. Please use the text box below.");
      return;
    }

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      appendErrorBubble("Please allow microphone access and try again.");
      return;
    }

    audioChunks = [];
    try {
      mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    } catch (err) {
      mediaRecorder = new MediaRecorder(stream);
    }
    mediaRecorder.ondataavailable = function (e) {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = function () {
      stream.getTracks().forEach(function (t) { t.stop(); });
    };
    mediaRecorder.start();
    recordingStartTime = Date.now();
    setState("recording");

    recordingTimerInterval = setInterval(function () {
      updateOrbStatus();
      const elapsed = (Date.now() - recordingStartTime) / 1000;
      if (elapsed >= MAX_RECORD_SECONDS) {
        stopRecording();
      }
    }, 1000);
  }

  function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state === "inactive") return;
    clearInterval(recordingTimerInterval);
    const elapsedSeconds = (Date.now() - recordingStartTime) / 1000;

    mediaRecorder.addEventListener("stop", function onStop() {
      if (elapsedSeconds < 1) {
        setState("idle");
        appendErrorBubble("That recording was too short. Please try again.");
        return;
      }
      const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
      sendVoice(audioBlob, elapsedSeconds);
    }, { once: true });

    mediaRecorder.stop();
  }

  function handleOrbTap() {
    if (state === "thinking") return;
    unlockAudioPlayback();
    if (state === "recording") {
      stopRecording();
      return;
    }
    if (state === "speaking" && currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    startRecording();
  }

  // ---------- Text input wiring ----------

  function autoResize() {
    textInput.style.height = "auto";
    textInput.style.height = Math.min(textInput.scrollHeight, 110) + "px";
    const hasText = textInput.value.trim().length > 0;
    sendButton.classList.toggle("ready", hasText);
  }

  textInput.addEventListener("input", autoResize);
  textInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendText();
    }
  });
  sendButton.addEventListener("click", sendText);
  orbButton.addEventListener("click", handleOrbTap);

  // ---------- Settings popover ----------

  personaPill.addEventListener("click", function () {
    settingsPopover.classList.toggle("hidden");
    personaPill.classList.toggle("open");
    personaPill.setAttribute("aria-expanded", String(!settingsPopover.classList.contains("hidden")));
  });

  document.addEventListener("click", function (e) {
    if (!settingsPopover.contains(e.target) && !personaPill.contains(e.target)) {
      settingsPopover.classList.add("hidden");
      personaPill.classList.remove("open");
      personaPill.setAttribute("aria-expanded", "false");
    }
  });

  document.querySelectorAll(".settings-options").forEach(function (group) {
    group.addEventListener("click", function (e) {
      const btn = e.target.closest("button");
      if (!btn) return;
      group.querySelectorAll("button").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      const key = group.getAttribute("data-group");
      const value = btn.getAttribute("data-value");
      if (key === "persona") persona = value;
      if (key === "voiceGender") voiceGender = value;
    });
  });

  // Initial state
  setState("idle");
})();
</script>
</body>
</html>
